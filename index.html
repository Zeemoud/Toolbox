<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toolbox by Zeemoud</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        background: #1a1a1a;
        color: white;
        padding: 50px;
      }
      .card {
        background: #2d2d2d;
        padding: 30px;
        border-radius: 15px;
        display: inline-block;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
      h1 {
        color: #00ff88;
      }
      .btn {
        display: inline-block;
        background: #00ff88;
        color: #1a1a1a;
        padding: 15px 25px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
        margin-top: 20px;
        transition: 0.3s;
      }
      .btn:hover {
        background: #00cc6e;
        transform: scale(1.05);
      }
      p {
        color: #ccc;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🛠️ Ma Super Toolbox</h1>
      <p>
        Une application tout-en-un pour télécharger des vidéos, générer des QR
        codes et bien plus.
      </p>
      <a
        href="https://github.com/Zeemoud/Toolbox/releases/download/v1.0/toolbox-setup.exe"
        class="btn"
      >
        Télécharger pour Windows (Gratuit)
      </a>
    </div>
  </body>
</html>
